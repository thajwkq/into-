<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نيون كورة - Neon Kora PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --neon-green: #00ff88;
    --neon-blue: #0055ff;
    --neon-pink: #ff007f;
    --bg-dark: #050505;
    --card-bg: #111;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    background: var(--bg-dark);
    color: white;
    padding-bottom: 90px;
}

header {
    background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    box-shadow: 0 0 20px var(--neon-green);
}

.main-section {
    padding: 20px;
    display: none;
}

.main-section.active-section {
    display: block;
}

.section-title {
    font-size: 24px;
    margin-bottom: 20px;
}

.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.news-card {
    background: var(--card-bg);
    border-radius: 15px;
    overflow: hidden;
}

.news-content {
    padding: 15px;
}

/* MATCHES */
.match-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    border: 1px solid #222;
}

.team-name {
    font-weight: bold;
}

.match-time {
    color: var(--neon-pink);
}

/* NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0d0d0d;
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

.nav-item {
    color: #777;
    cursor: pointer;
}

.nav-item.active-news { color: var(--neon-green); }
.nav-item.active-transfers { color: var(--neon-blue); }
.nav-item.active-matches { color: var(--neon-pink); }
</style>
</head>

<body>

<header>⚽ نيون كورة PRO</header>

<!-- NEWS -->
<section id="news-section" class="main-section active-section">
    <h2 class="section-title">📰 الأخبار</h2>
    <div class="news-grid" id="newsContainer"></div>
</section>

<!-- TRANSFERS -->
<section id="transfers-section" class="main-section">
    <h2 class="section-title">🔄 الانتقالات</h2>
    <div class="news-grid" id="transfersContainer"></div>
</section>

<!-- MATCHES -->
<section id="matches-section" class="main-section">
    <h2 class="section-title">⚽ المباريات</h2>
    <div id="matchesContainer">جاري التحميل...</div>
</section>

<!-- NAV -->
<nav class="bottom-nav">
    <div class="nav-item active-news" onclick="switchTab('news-section', this,'active-news')">📰 أخبار</div>
    <div class="nav-item" onclick="switchTab('transfers-section', this,'active-transfers')">🔄 انتقالات</div>
    <div class="nav-item" onclick="switchTab('matches-section', this,'active-matches')">⚽ مباريات</div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE (بدون تغيير) */
const firebaseConfig = {
    apiKey: "AIzaSyAqVn95G-kDSwdnd2tr-UFhL4twDFvBa5Y",
    authDomain: "footballnew-9d15a.firebaseapp.com",
    projectId: "footballnew-9d15a",
    storageBucket: "footballnew-9d15a.firebasestorage.app",
    messagingSenderId: "167129883946",
    appId: "1:167129883946:web:b8be90da80da938b582a53",
    measurementId: "G-P2GCN3M052"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* RAPID API */
const RAPID_KEY = "YOUR_RAPIDAPI_KEY";
const RAPID_HOST = "free-api-live-football-data.p.rapidapi.com";

/* ELEMENTS */
const newsContainer = document.getElementById("newsContainer");
const transfersContainer = document.getElementById("transfersContainer");
const matchesContainer = document.getElementById("matchesContainer");

/* NAV SWITCH */
window.switchTab = function(sectionId, element, activeClass){
    document.querySelectorAll('.main-section').forEach(s=>s.classList.remove('active-section'));
    document.getElementById(sectionId).classList.add('active-section');

    document.querySelectorAll('.nav-item').forEach(n=>{
        n.classList.remove('active-news','active-transfers','active-matches');
    });

    element.classList.add(activeClass);

    if(sectionId === "matches-section"){
        loadLiveMatches();
    }
}

/* ================= FIREBASE NEWS ================= */
async function loadNews(){
    const querySnapshot = await getDocs(collection(db,"news"));

    newsContainer.innerHTML = "";
    transfersContainer.innerHTML = "";

    let newsFound=false;
    let transfersFound=false;

    querySnapshot.forEach(doc=>{
        const n = doc.data();

        const card = `
        <div class="news-card">
            <div class="news-content">
                <h3>${n.title || "بدون عنوان"}</h3>
                <p>${n.description || ""}</p>
            </div>
        </div>`;

        const text = (n.title+n.description).toLowerCase();

        if(text.includes("انتقال")||text.includes("صفقة")||text.includes("ميركاتو")){
            transfersContainer.innerHTML += card;
            transfersFound=true;
        } else {
            newsContainer.innerHTML += card;
            newsFound=true;
        }
    });

    if(!newsFound) newsContainer.innerHTML="لا توجد أخبار";
    if(!transfersFound) transfersContainer.innerHTML="لا توجد انتقالات";
}

/* ================= LIVE MATCHES (RAPIDAPI) ================= */
async function loadLiveMatches(){
    try{
        const res = await fetch(
            "https://free-api-live-football-data.p.rapidapi.com/football-current-live",
            {
                headers:{
                    "x-rapidapi-key":RAPID_KEY,
                    "x-rapidapi-host":RAPID_HOST
                }
            }
        );

        const data = await res.json();
        const matches = data.response || [];

        let html = "";

        if(!matches.length){
            html = "<p>لا توجد مباريات مباشرة الآن</p>";
        }

        matches.forEach(m=>{
            html += `
            <div class="match-card">
                <span class="team-name">${m.homeTeam?.name || "Home"}</span>
                <span class="match-time">🔴 LIVE</span>
                <span class="team-name">${m.awayTeam?.name || "Away"}</span>
            </div>`;
        });

        matchesContainer.innerHTML = html;

    }catch(e){
        console.error(e);
        matchesContainer.innerHTML = "خطأ في جلب المباريات";
    }
}

/* INIT */
loadNews();
loadLiveMatches();

</script>

</body>
</html>
